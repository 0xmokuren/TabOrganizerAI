<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Cluster AI</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-top">
        <h1>Tab Cluster AI</h1>
        <span class="version-badge">v1.5.3</span>
      </div>
    </header>

    <section class="provider-bar" data-i18n-aria-label="ariaAiProvider">
      <div class="provider-switch" role="radiogroup" data-i18n-aria-label="ariaAnalysisMethod">
        <label class="provider-option">
          <input type="radio" name="ai-provider" id="provider-on-device" value="on-device" checked />
          <span class="provider-option-label" data-i18n="providerOnDevice"></span>
        </label>
        <label class="provider-option">
          <input type="radio" name="ai-provider" id="provider-gemini-api" value="gemini-api" />
          <span class="provider-option-label" data-i18n="providerGeminiApi"></span>
        </label>
      </div>
      <div class="status-row">
        <span id="status-dot" class="status-dot" aria-hidden="true"></span>
        <p id="ai-status" class="status-text" data-i18n="statusChecking"></p>
      </div>
      <p id="provider-detail" class="provider-detail hidden"></p>
    </section>

    <details id="gemini-settings-section" class="panel gemini-settings hidden">
      <summary data-i18n="apiSettingsSummary"></summary>
      <div class="panel-body">
        <p class="panel-help" data-i18n="apiSettingsHelp"></p>
        <label class="field-label" for="gemini-api-key-input" data-i18n="apiKeyLabel"></label>
        <input
          id="gemini-api-key-input"
          type="password"
          autocomplete="off"
          spellcheck="false"
          data-i18n-placeholder="apiKeyPlaceholder"
        />
        <p class="panel-link">
          <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer" data-i18n="getApiKeyLink"></a>
        </p>
        <label class="field-label" for="gemini-model-select" data-i18n="modelLabel"></label>
        <select id="gemini-model-select"></select>
        <p id="ai-provider-status" class="inline-status" aria-live="polite"></p>
      </div>
    </details>

    <details id="diagnostics" class="panel diagnostics">
      <summary data-i18n="diagnosticsSummary"></summary>
      <div class="panel-body">
        <ul id="diagnostics-list"></ul>
      </div>
    </details>

    <details id="user-prompt-section" class="panel user-prompt">
      <summary data-i18n="userPromptSummary"></summary>
      <div class="panel-body">
        <p class="panel-help" data-i18n="userPromptHelp"></p>
        <textarea
          id="user-prompt-input"
          rows="3"
          maxlength="500"
          data-i18n-placeholder="userPromptPlaceholder"
        ></textarea>
        <p id="user-prompt-status" class="inline-status" aria-live="polite"></p>
      </div>
    </details>

    <section class="controls">
      <label class="toggle-pill">
        <input type="checkbox" id="current-window-only" checked />
        <span data-i18n="currentWindowOnly"></span>
      </label>
      <button id="analyze-btn" type="button" class="primary" data-i18n="analyzeWithAi"></button>
      <button id="rule-based-btn" type="button" class="secondary" data-i18n="organizeByDomain"></button>
    </section>

    <section id="progress-section" class="hidden">
      <p id="progress-percent" class="progress-percent hidden"></p>
      <p id="progress-text" data-i18n="preparingAi"></p>
      <p id="progress-detail" class="progress-detail hidden"></p>
      <pre id="progress-stream" class="progress-stream hidden" aria-live="polite"></pre>
      <div class="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </section>

    <section id="summary-section" class="hidden">
      <p id="summary-text" class="summary-text"></p>
    </section>

    <section id="preview-section" class="hidden">
      <h2 data-i18n="previewHeading"></h2>
      <div id="preview-list"></div>
      <div class="actions">
        <button id="apply-btn" type="button" class="primary" data-i18n="applyGroups"></button>
        <button id="cancel-btn" type="button" class="secondary" data-i18n="cancel"></button>
      </div>
    </section>

    <p id="error-text" class="error hidden"></p>

    <script type="module" src="popup.js"></script>
  </body>
</html>
