<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Tab Organizer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>AI Tab Organizer</h1>
      <p id="ai-status" class="status">状態を確認中…</p>
      <p class="version">v1.2.0</p>
    </header>

    <details id="diagnostics" class="diagnostics">
      <summary>診断情報</summary>
      <ul id="diagnostics-list"></ul>
    </details>

    <details id="user-prompt-section" class="user-prompt">
      <summary>グループ化の方針（任意）</summary>
      <p class="user-prompt-help">
        仕事用タブとプライベートを分ける、買い物関連をまとめる、などの希望を書けます。内容はこのブラウザにのみ保存されます。
      </p>
      <textarea
        id="user-prompt-input"
        rows="3"
        maxlength="500"
        placeholder="例: 仕事関連は青系、ニュースは1グループ、ショッピングはドメインごと"
      ></textarea>
      <p id="user-prompt-status" class="user-prompt-status" aria-live="polite"></p>
    </details>

    <section class="controls">
      <label class="checkbox">
        <input type="checkbox" id="current-window-only" checked />
        現在のウィンドウのみ
      </label>
      <button id="analyze-btn" type="button">AI で分析</button>
      <button id="rule-based-btn" type="button">ドメインで整理</button>
    </section>

    <section id="progress-section" class="hidden">
      <p id="progress-percent" class="progress-percent hidden"></p>
      <p id="progress-text">AI を準備しています…</p>
      <p id="progress-detail" class="progress-detail hidden"></p>
      <pre id="progress-stream" class="progress-stream hidden" aria-live="polite"></pre>
      <div class="progress-bar">
        <div id="progress-fill"></div>
      </div>
    </section>

    <section id="summary-section" class="hidden">
      <p id="summary-text"></p>
    </section>

    <section id="preview-section" class="hidden">
      <h2>提案プレビュー</h2>
      <div id="preview-list"></div>
      <div class="actions">
        <button id="apply-btn" type="button" class="primary">グループを適用</button>
        <button id="cancel-btn" type="button">キャンセル</button>
      </div>
    </section>

    <p id="error-text" class="error hidden"></p>

    <script type="module" src="popup.js"></script>
  </body>
</html>
